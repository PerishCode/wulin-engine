[scan]
include = [
  ".runseal/**/*.ts",
  "apps/*/src/**",
  "crates/*/src/**",
  "experiments/*/src/**",
  "tools/*/src/**",
]
exclude = ["**/target/**", ".local/**", "out/**"]

[[overrides]]
match = "experiments/0001-gpu-lab/src/main.rs"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 900 }

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Experiment 0001 remains an isolated executable proof."

[overrides.rules."core/naming/too-many-words"]
payload = { max_words = 6 }

[[overrides]]
match = "apps/workbench/src"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 11 }
reason = "The native workbench root keeps its current scene, streaming, inspect, and rendering owners explicit."

[[overrides]]
match = "apps/workbench/src/rendering"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 11 }
reason = "The rendering boundary keeps canonical composition and its reusable GPU subsystem owners explicit."

[[overrides]]
match = "apps/workbench/src/rendering/composition"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 12 }
reason = "Atomic composition keeps pair state, probes, grounding, traversal, and publication policies separate."

[[overrides]]
match = "apps/workbench/src/rendering/terrain"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 12 }
reason = "Terrain keeps cache, transfer, descriptors, pipeline, projection, LOD, and probe owners explicit."

[[overrides]]
match = ".runseal/support/canonical-runtime.ts"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 700 }
reason = "The direct acceptance owner keeps lifecycle, fault, traversal, and resource gates in one non-recursive workflow boundary."

[[overrides]]
match = "apps/workbench/src/scene/mod.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Private scene constants are exercised beside their owner."

[[overrides]]
match = "apps/workbench/src/world.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Split-coordinate invariants remain private to the world owner."

[[overrides]]
match = "apps/workbench/src/streaming/address.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Signed-to-bounded projection tests exercise private checked arithmetic."

[[overrides]]
match = "apps/workbench/src/streaming/async_resident.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Source-addressed cache reuse tests require private cache state."

[[overrides]]
match = "apps/workbench/src/rendering/composition/traversal.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Traversal and rollover tests exercise the private bounded scheduler."

[[overrides]]
match = "apps/workbench/src/rendering/terrain/cache.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Terrain source-identity tests require private slot state."

[[overrides]]
match = "apps/workbench/src/rendering/terrain/projection.rs"
kind = "file"
priority = 10

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Centered projection invariants remain private to the terrain renderer."

[[overrides]]
match = "apps/workbench/src/rendering/terrain/transfer.rs"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 550 }
reason = "The terrain transfer owner keeps reservation, copy, fence, gate, and publication lifecycle together."

[[overrides]]
match = "crates/terrain-format/src/global.rs"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 550 }
reason = "The signed terrain format keeps metadata, index validation, exact reads, and writing in one owner."

[[overrides]]
match = "crates/region-format/src/global.rs"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 600 }
reason = "The schema-3 object format keeps triple-plane validation, exact reads, and writing in one owner."
