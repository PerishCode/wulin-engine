[scan]
include = [
  ".runseal/**/*.ts",
  "apps/*/src/**",
  "crates/*/src/**",
  "experiments/*/src/**",
  "tools/*/src/**",
]
exclude = ["**/target/**", ".local/**", "out/**"]

[[overrides]]
match = "experiments/0001-gpu-lab/src/main.rs"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 900 }

[overrides.rules."rust/tests/in-source"]
enabled = false
reason = "Experiment 0001 remains an isolated executable proof."

[overrides.rules."core/naming/too-many-words"]
payload = { max_words = 6 }

[[overrides]]
match = "crates/engine-runtime/src/rendering/composition"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 12 }
reason = "Atomic composition keeps pair state, probes, grounding, traversal, and publication policies separate."

[[overrides]]
match = "crates/engine-runtime/src/rendering/terrain"
kind = "dir"
priority = 10

[overrides.rules."core/fs/too-many-children"]
payload = { max_children = 12 }
reason = "Terrain keeps cache, transfer, descriptors, pipeline, projection, LOD, and probe owners explicit."

[[overrides]]
match = ".runseal/support/canonical-runtime.ts"
kind = "file"
priority = 10

[overrides.rules."core/source/too-long"]
severity = "warning"
payload = { max_lines = 700 }
reason = "The direct acceptance owner keeps lifecycle, fault, traversal, and resource gates in one non-recursive workflow boundary."

